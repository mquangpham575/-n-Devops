server:
  port: ${SERVER_PORT:9000}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: 
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - HEAD
              - PATCH
            allowedHeaders: 
              - "*"
            exposedHeaders:
              - Authorization
              - Content-Disposition
            maxAge: 3600
      routes:
        # User Service Routes
        - id: user-service-auth
          uri: ${USER_SERVICE_URL:http://user-service:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /api/auth/$\{segment}
        
        - id: user-service-users
          uri: ${USER_SERVICE_URL:http://user-service:8081}
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /api/users/$\{segment}
        
        - id: user-service-follow
          uri: ${USER_SERVICE_URL:http://user-service:8081}
          predicates:
            - Path=/api/follow/**
          filters:
            - RewritePath=/api/follow/(?<segment>.*), /api/follow/$\{segment}

        - id: user-service-notifications
          uri: ${USER_SERVICE_URL:http://user-service:8081}
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/(?<segment>.*), /api/notifications/$\{segment}

        - id: user-service-messages
          uri: ${USER_SERVICE_URL:http://user-service:8081}
          predicates:
            - Path=/api/messages/**
          filters:
            - RewritePath=/api/messages/(?<segment>.*), /api/messages/$\{segment}
        
        # Blog Service Routes
        - id: blog-service-blogs
          uri: ${BLOG_SERVICE_URL:http://blog-service:8082}
          predicates:
            - Path=/api/blogs/**
          filters:
            - RewritePath=/api/blogs/(?<segment>.*), /api/blogs/$\{segment}
            - RewritePath=/api/blogs, /api/blogs
        
        # Category Routes (in blog-service)
        - id: blog-service-categories
          uri: ${BLOG_SERVICE_URL:http://blog-service:8082}
          predicates:
            - Path=/api/categories/**
          filters:
            - RewritePath=/api/categories/(?<segment>.*), /api/categories/$\{segment}
            - RewritePath=/api/categories, /api/categories
        
        # Comment Service Routes (also in blog-service)
        - id: blog-service-comments
          uri: ${BLOG_SERVICE_URL:http://blog-service:8082}
          predicates:
            - Path=/api/comments/**
          filters:
            - RewritePath=/api/comments/(?<segment>.*), /api/comments/$\{segment}

        # Static Uploads
        - id: blog-service-uploads
          uri: ${BLOG_SERVICE_URL:http://blog-service:8082}
          predicates:
            - Path=/api/uploads/**
          filters:
            - RewritePath=/api/uploads/(?<segment>.*), /uploads/$\{segment}
        
        # File Service Routes
        - id: file-service-files
          uri: ${FILE_SERVICE_URL:http://file-service:8083}
          predicates:
            - Path=/api/files/**
          filters:
            - RewritePath=/api/files/(?<segment>.*), /api/files/$\{segment}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

